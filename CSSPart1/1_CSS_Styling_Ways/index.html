<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Styling Ways</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Internal CSS -->
    <style>
        h2 {
            color: blue;
            text-align: center;
        }
        .internal-box {
            background-color: lightyellow;
            padding: 10px;
            border: 2px solid orange;
        }
    </style>
</head>
<body>

    <h1>CSS Styling Ways</h1>

    <!-- Inline CSS -->
    <h3 style="color: red;">This is Inline CSS Example</h3>

    <!-- Internal CSS -->
    <div class="internal-box">
        <h2>This is Internal CSS Example</h2>
        <p>Styled using internal CSS inside head tag.</p>
    </div>

    <!-- External CSS -->
    <div class="external-box">
        <h2>External CSS Example</h2>
        <p>This is styled using external CSS file.</p>
    </div>

</body>
</html>
